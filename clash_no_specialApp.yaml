# ========================
# 10. 外部规则提供者 (Rule Set)
# ========================
rule-anchor:
  ip_mrs:
    &ip_mrs {
      type: http,
      interval: 86400,
      behavior: ipcidr,
      format: mrs,
      proxy: Proxy,
    }
  domain_yaml:
    &domain_yaml {
      type: http,
      interval: 86400,
      behavior: domain,
      format: yaml,
      proxy: Proxy,
    }
  domain_mrs:
    &domain_mrs {
      type: http,
      interval: 86400,
      behavior: domain,
      format: mrs,
      proxy: Proxy,
    }
  domain_text:
    &domain_text {
      type: http,
      interval: 86400,
      behavior: domain,
      format: text,
      proxy: Proxy,
    }
  class_yaml:
    &class_yaml {
      type: http,
      interval: 86400,
      behavior: classical,
      format: yaml,
      proxy: Proxy,
    }

rule-providers:
  applications:
    <<: *class_yaml
    url: https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/applications.txt
    path: "./ruleset/loyalsoldier/applications.yaml"

  private_domain:
    <<: *domain_mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"
    path: "./ruleset/meta-rules-dat/geosite/private.mrs"

  fake_ip_filter_text:
    <<: *domain_text
    url: "https://raw.githubusercontent.com/juewuy/ShellCrash/refs/heads/dev/public/fake_ip_filter.list"
    path: "./ruleset/meta-rules-dat/list/fake_ip_filter.list"

  private_ip:
