# ========================
# 1. 基础监听与通用设置
# ========================
mixed-port: 7890
allow-lan: false
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: info
find-process-mode: off
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true # 存储上次选择的节点
  store-fake-ip: true # 持久化 Fake-IP 映射

# ========================
# 2. 外部控制与面板设置
# ========================
external-controller: 0.0.0.0:9090
secret: ""
external-ui: ui
external-ui-name: xd
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

# ========================
# 3. GeoIP/GeoSite 数据库配置
# ========================
geodata-loader: memconservative
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"

# ========================
# 4. TUN 模式设置 (虚拟网卡)
# ========================
tun:
  enable: true
  device: utunMihomo
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  strict-route: true  # 防止多宿主 DNS 泄露（Windows/Android/Linux）

# ========================
# 5. NTP 时间同步
# ========================
ntp:
  enable: true
  write-to-system: true
  server: ntp1.aliyun.com
  port: 123
  interval: 30

# ========================
# 6. 代理集合 (机场订阅来源)
# ========================
proxy-providers:
  Airport:
    url: ""
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    # exclude-filter: "(?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置"
    # override:
    #   additional-prefix: "✈️ |"

# ========================
# 7. DNS 解析设置 (防污染核心)
# ========================
dns:
  enable: true
  listen: "0.0.0.0:1053"
  ipv6: false
  prefer-h3: false
  respect-rules: true
  use-system-hosts: false
  cache-algorithm: arc
  enhanced-mode: fake-ip # 增强模式: Fake-IP
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter: # Fake-IP 过滤列表 (直接返回真实IP的域名)
    - "+.lan"
    - "+.local"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "localhost.ptlogin2.qq.com"
    - "localhost.sec.qq.com"
    - "+.in-addr.arpa"
    - "+.ip6.arpa"
    - "time.*.com"
    - "time.*.gov"
    - "pool.ntp.org"
    - "localhost.work.weixin.qq.com"
  default-nameserver: # 引导 DNS (用于解析 DoH 域名)
    - 223.5.5.5
    - 8.8.4.4
  nameserver: # 默认 DNS (通常用于非国内域名)
    - https://8.8.4.4/dns-query
    - https://208.67.222.222/dns-query
    - https://77.88.8.8/dns-query
    - https://1.1.1.1/dns-query
  proxy-server-nameserver: # 代理节点本身的域名解析 DNS（使用 IP 避免域名解析循环依赖）
    - https://223.5.5.5/dns-query
    - https://119.29.29.29/dns-query
  direct-nameserver: # 直连 DNS (用于国内域名)
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
  nameserver-policy: # 指定域名走特定 DNS
    "geosite:private,cn":
      - https://223.5.5.5/dns-query
      - https://doh.pub/dns-query
    "geosite:geolocation-!cn":
      - https://8.8.4.4/dns-query
      - https://208.67.222.222/dns-query
      - https://77.88.8.8/dns-query
      - https://1.1.1.1/dns-query

# ========================
# 8. 锚点配置 (配置模板，供下方引用)
# ========================
group-base: &group-base
  interval: 300
  timeout: 3000
  url: "https://www.gstatic.com/generate_204"
  max-failed-times: 3
  # hidden: true

region-base: &region-base
  type: url-test
  use:
    - Airport
  tolerance: 50
  # hidden: true

# ========================
